# Configuración básica de Starship
"$schema" = 'https://starship.rs/config-schema.json'

# Configuración general
add_newline = true
command_timeout = 1000
scan_timeout = 30

# Formato del prompt
format = """
[╭─](bold blue)$username$hostname$directory$git_branch$git_status$python$nodejs$rust$golang$java$docker_context
[╰─](bold blue)$character"""

# Carácter del prompt
[character]
success_symbol = "[🐱](bold green)"
error_symbol = "[🙀](bold red)"
vicmd_symbol = '[V](bold yellow)'

# Usuario
[username]
style_user = 'bold orange'
style_root = 'bold red'
format = '[$user]($style) '
disabled = false
show_always = true

# Hostname
[hostname]
ssh_only = false
format = 'en [$hostname](bold purple) '
disabled = false

# Directorio
[directory]
style = 'bold orange'
format = 'en [$path]($style)[$read_only]($read_only_style) '
truncation_length = 3
truncation_symbol = '…/'
read_only = ' 🔒'

# Git branch
[git_branch]
symbol = ' '
style = 'bold cyan'
format = 'en [$symbol$branch]($style) '

# Git status
[git_status]
style = 'bold red'
format = '([$all_status$ahead_behind]($style) )'
conflicted = '⚡'
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
up_to_date = '✓'
untracked = '?${count}'
stashed = '$${count}'
modified = '!${count}'
staged = '+${count}'
renamed = '»${count}'
deleted = '✘${count}'

# Python
[python]
symbol = ' '
style = 'bold green'
format = 'con [${symbol}${pyenv_prefix}(${version} )(\\($virtualenv\\) )]($style)'

# Node.js
[nodejs]
symbol = ' '
style = 'bold green'
format = 'con [$symbol($version )]($style)'

# Rust
[rust]
symbol = ' '
style = 'bold red'
format = 'con [$symbol($version )]($style)'

# Go
[golang]
symbol = ' '
style = 'bold cyan'
format = 'con [$symbol($version )]($style)'

# Java
[java]
symbol = ' '
style = 'bold red'
format = 'con [$symbol($version )]($style)'

# Docker
[docker_context]
symbol = ' '
style = 'bold blue'
format = 'con [$symbol$context]($style) '

# Tiempo de ejecución del comando
[cmd_duration]
min_time = 2000
style = 'bold yellow'
format = 'tardó [$duration]($style) '

# Hora
[time]
disabled = false
style = 'bold white'
format = 'a las [$time]($style) '
time_format = '%H:%M:%S'

# Batería
[battery]
full_symbol = '🔋'
charging_symbol = '⚡'
discharging_symbol = '💀'

[[battery.display]]
threshold = 15
style = 'bold red'

[[battery.display]]
threshold = 50
style = 'bold yellow'

# Memoria
[memory_usage]
disabled = false
threshold = 70
symbol = ' '
style = 'bold dimmed red'
format = 'usando [$symbol${ram}( | ${swap})]($style) '

# AWS
[aws]
symbol = "  "
style = "bold yellow"
format = 'con [$symbol($profile )]($style)'
disabled = false

# Terraform
[terraform]
symbol = "💠 "
style = "bold purple"
format = 'con [$symbol$workspace]($style) '
disabled = false

# Kubernetes
[kubernetes]
symbol = "☸ "
style = "bold blue"
format = 'con [$symbol$context( \\($namespace\\))]($style) '
disabled = false

# Package
[package]
symbol = "📦 "
style = "bold cyan"
format = 'con [$symbol$version]($style) '
disabled = false

# Container
[container]
symbol = "⬢ "
style = "bold red"
format = '[$symbol \\[$name\\]]($style) '


